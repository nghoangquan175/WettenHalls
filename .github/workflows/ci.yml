name: CI Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-check:
    name: Frontend (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json
          
      - name: Install Dependencies
        working-directory: ./frontend-next
        run: npm ci
        
      - name: Run Lint
        working-directory: ./frontend-next
        run: npm run lint
        
      - name: Build Project
        working-directory: ./frontend-next
        run: npm run build
        env:
          # Chỉ cần mock data để Next.js build pass, không cần lấy đồ thật ở bước CI này
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:1337' }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ vars.NEXT_PUBLIC_RECAPTCHA_SITE_KEY || 'dummy-key' }}
          NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL || 'http://20.215.212.210:5000/api' }}
