name: CI Check
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend-next
      - name: Lint Frontend
        run: npm run lint
        working-directory: ./frontend-next
      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend-next

  # Bạn có thể thêm job cho backend tương tự nếu có script lint/build
